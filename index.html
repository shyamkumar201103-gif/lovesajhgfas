<!DOCTYPE html>
<html>
<head>
<title>Love Typing</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  text-align: center;
  font-family: Arial;
}

.container {
  margin-top: 200px;
}

button {
  padding: 10px 20px;
  font-size: 18px;
  margin: 10px;
  cursor: pointer;
}

#yesBtn {
  background: red;
  color: white;
}

#noBtn {
  background: gray;
  color: white;
  position: absolute;
}

#typingText {
  font-size: 30px;
  color: pink;
  margin-top: 50px;
}
</style>

</head>

<body>

<div class="container" id="main">
  <h1>Hey ❤️</h1>
  <p>Do you love me?</p>

  <button id="yesBtn" onclick="yes()">YES</button>
  <button id="noBtn">NO</button>

  <div id="typingText"></div>
</div>

<script>

// Typing effect text
let text = "I Love You ❤️";
let i = 0;

// YES button click
function yes() {
  document.getElementById("typingText").innerHTML = "";
  i = 0;
  typeEffect();
}

// typing function
function typeEffect() {
  if (i < text.length) {
    document.getElementById("typingText").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeEffect, 100);
  }
}

// NO button run away
let noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", function() {
  let x = Math.random() * window.innerWidth;
  let y = Math.random() * window.innerHeight;

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
});

</script>

</body>
</html>
